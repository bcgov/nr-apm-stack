image:
  repository: image-registry.openshift-image-registry.svc:5000/NAMESPACE/iam-key-sync
  tag: latest
  pullPolicy: Always

cronjob:
  # Standard cron expression — runs daily at 2am
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  restartPolicy: OnFailure

config:
  targetEnv: production

# Sensitive values — set via --set or a sealed-secret/external-secret in production.
# Do not commit real values here.
secret:
  brokerJwt: ""
  brokerUrl: ""
  vaultUrl: ""
